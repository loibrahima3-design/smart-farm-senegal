{% extends "ferme/base.html" %}

{% block title %}
Parcelles
{% endblock %}

{% block content %}

<h1>🚜 Liste des parcelles</h1>

<table class="table table-striped table-bordered mt-4">

    <thead class="table-success">
        <tr>
            <th>Nom</th>
            <th>Superficie (ha)</th>
            <th>Culture</th>
        </tr>
    </thead>

    <tbody>

    {% for p in parcelles %}

        <tr>
            <td>{{ p.nom }}</td>
            <td>{{ p.superficie }}</td>
            <td>{{ p.culture.nom }}</td>
        </tr>

    {% empty %}

        <tr>
            <td colspan="3" class="text-center">
                Aucune parcelle enregistrée.
            </td>
        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
